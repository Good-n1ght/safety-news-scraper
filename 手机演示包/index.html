<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>强安兴企系列</title>
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --text: #1a1a2e;
  --muted: #6b7280;
  --accent: #1e3a5f;
  --accent-light: #2d5a8e;
  --accent-glow: rgba(45, 90, 142, 0.12);
  --line: #e0e4e8;
  --line-light: #eef1f5;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
    "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(135deg, #1a2d47 0%, #1e3a5f 50%, #264a73 100%);
  color: #fff;
  padding: 48px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,255,255,0.06), transparent);
  pointer-events: none;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}
.header .subtitle {
  font-size: 1rem;
  opacity: 0.78;
  font-weight: 400;
}
.header .badge {
  display: inline-block;
  margin-top: 16px;
  padding: 4px 16px;
  border-radius: 999px;
  font-size: 0.78rem;
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.03em;
}
.wrapper {
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 24px 56px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  display: flex;
  flex-direction: column;
  position: relative;
}
.card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
  border-color: var(--accent-light);
}
.card:active { transform: translateY(0); }
.card .icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.card .icon.blue  { background: #e8f0fe; color: var(--accent-light); }
.card .icon.teal  { background: #e6f7f5; color: #0d7d6e; }
.card h2 {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.3;
}
.card p {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.55;
  flex: 1;
}
.card .tag-row {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.card .tag {
  font-size: 0.72rem;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--line-light);
  color: var(--muted);
  white-space: nowrap;
}
.card .arrow {
  position: absolute;
  right: 24px;
  top: 32px;
  font-size: 1rem;
  color: var(--muted);
  opacity: 0.5;
  transition: opacity 0.2s, transform 0.2s;
}
.card:hover .arrow {
  opacity: 1;
  transform: translateX(3px);
}
.footer {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 0.82rem;
  border-top: 1px solid var(--line);
  margin-top: 0;
}
@media (max-width: 480px) {
  .header { padding: 36px 20px 32px; }
  .header h1 { font-size: 1.6rem; }
  .cards { grid-template-columns: 1fr; }
  .card { padding: 22px 20px 20px; }
}
</style>
</head>
<body>

<header class="header">
  <h1>强安兴企系列</h1>
  <p class="subtitle">企业安全智慧工具集</p>
  <span class="badge">安全生产 · 智能赋能</span>
</header>

<main class="wrapper">
  <div class="cards">

    <a class="card" href="强安兴企安全园地生文助手.html">
      <div class="icon blue">&#9998;</div>
      <span class="arrow">&rarr;</span>
      <h2>安全园地生文助手</h2>
      <p>智能文章生成，搜索安全资讯，一键生成多种体裁的安全宣传文章。</p>
      <div class="tag-row">
        <span class="tag">AI 写作</span>
        <span class="tag">安全资讯</span>
        <span class="tag">多体裁</span>
      </div>
    </a>

    <a class="card" href="强安视界_UI改版.html">
      <div class="icon teal">&#9881;</div>
      <span class="arrow">&rarr;</span>
      <h2>强安视界（在线版）</h2>
      <p>实时安全新闻聚合，多源抓取，智能排序，快速掌握安全领域动态。</p>
      <div class="tag-row">
        <span class="tag">新闻聚合</span>
        <span class="tag">多源抓取</span>
        <span class="tag">实时</span>
      </div>
    </a>

  </div>
</main>

<footer class="footer">
  强安兴企系列 &copy; 2026 &middot; 企业安全智慧工具集
</footer>

</body>
</html>
