name: 更新安全新闻素材 v2

# 每天北京时间 07:30 / 15:30 自动执行
on:
  schedule:
    - cron: "30 23 * * *"   # UTC 23:30 = 北京时间 07:30
    - cron: "30 7 * * *"    # UTC 07:30 = 北京时间 15:30
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        working-directory: scripts
        run: npm install

      - name: 执行采集
        working-directory: scripts
        run: node scrape-safety-news.js
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: 通知失败
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 安全新闻采集管道 v2 失败 (${new Date().toISOString().slice(0, 10)})`,
              body: `今日采集任务执行失败。\n\n[查看日志](${runUrl})\n\n可能原因：Google News RSS 不可达 / Gist Token 过期 / 依赖安装失败。`,
              labels: ["bug"],
            });
