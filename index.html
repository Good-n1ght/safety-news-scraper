<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>强安视界 - 新闻聚合</title>
<style>
:root {
  color-scheme: light;
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface-strong: #f0f4f8;
  --text: #1a1a2e;
  --muted: #6b7280;
  --line: #e0e4e8;
  --primary: #1976D2;
  --primary-soft: #E3F2FD;
  --primary-dark: #1565C0;
  --red: #d32f2f;
  --red-soft: #ffebee;
  --green: #2e7d32;
  --green-soft: #e8f5e9;
  --amber: #e65100;
  --amber-soft: #fff3e0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
button:disabled { cursor: wait; opacity: 0.7; }

.app-shell {
  width: min(900px, 100%);
  margin: 0 auto;
  padding: 16px 14px 36px;
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 0 16px;
  border-bottom: 2px solid var(--primary-soft);
  margin-bottom: 18px;
}
.header-left h1 {
  font-size: clamp(22px, 5vw, 30px);
  color: var(--primary);
  letter-spacing: 1px;
}
.header-left .date-text {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.icon-btn:hover { background: var(--primary-soft); color: var(--primary); }

/* ===== Controls Bar ===== */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.controls-bar select {
  height: 38px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.controls-bar select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(25,118,210,0.12);
}
.btn {
  height: 38px;
  padding: 0 16px;
  border: 0;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: background 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline {
  background: var(--surface);
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-soft); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-amber:hover { background: #bf360c; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #1b5e20; }
.btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }

.spacer { flex: 1; }

/* ===== Status ===== */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--muted);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ccc;
  flex-shrink: 0;
}
.status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
.status-dot.success { background: var(--green); }
.status-dot.error { background: var(--red); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ===== News List ===== */
.news-list { display: grid; gap: 8px; }

.news-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface);
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: pointer;
}
.news-item:hover {
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(25,118,210,0.1);
}
.news-item.selected {
  border-color: var(--primary);
  background: var(--primary-soft);
}

.news-checkbox {
  width: 22px; height: 22px;
  margin-top: 2px;
  accent-color: var(--primary);
  cursor: pointer;
  flex-shrink: 0;
}
.news-body { flex: 1; min-width: 0; }
.news-title {
  font-size: 15px;
  font-weight: 800;
  line-height: 1.4;
  margin-bottom: 6px;
  color: var(--text);
}
.news-title .rewritten { color: var(--primary); }
.news-title .badge-ai {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--primary-soft);
  color: var(--primary);
  font-weight: 700;
  vertical-align: middle;
  margin-left: 4px;
}
.badge-hot {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 999px;
  background: #fff3e0;
  color: #e65100;
  font-weight: 700;
  vertical-align: middle;
  margin-left: 4px;
  cursor: default;
}
.mode-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  margin-right: 4px;
}
.btn-rewrite-item {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 4px;
  border: 1px solid #e65100;
  background: #fff;
  color: #e65100;
  cursor: pointer;
  font-weight: 600;
  margin-left: 8px;
  vertical-align: middle;
  transition: all 0.15s;
}
.btn-rewrite-item:hover { background: #fff3e0; }
.btn-undo-item {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 4px;
  border: 1px solid #999;
  background: #fff;
  color: #666;
  cursor: pointer;
  font-weight: 600;
  margin-left: 4px;
  vertical-align: middle;
  transition: all 0.15s;
}
.btn-undo-item:hover { background: #f5f5f5; }
.news-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.news-category {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: #f0f4f8;
  color: #4a5568;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ===== Article Cards (generated) ===== */
.article-section {
  margin-top: 18px;
}
.article-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--surface);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.article-card-img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  display: block;
}
.article-card-img-placeholder {
  width: 100%;
  min-height: 140px;
  background: linear-gradient(135deg, var(--primary-soft), #BBDEFB);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  font-size: 14px;
  font-weight: 700;
}
.article-card-bar {
  height: 6px;
  width: 100%;
}
.article-card-body { padding: 16px; }
.article-card-body h3 {
  font-size: 17px;
  margin-bottom: 8px;
  color: var(--primary);
}
.article-card-body p {
  font-size: 14px;
  line-height: 1.7;
  color: #333;
  margin-bottom: 6px;
}
.article-card-body .article-summary {
  font-size: 14px;
  line-height: 1.8;
  color: #333;
  margin-bottom: 8px;
  white-space: pre-line;
}
.article-card-body .source-link {
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
}
.article-card-body .source-link a {
  color: var(--primary);
  text-decoration: none;
}

/* ===== Settings Overlay ===== */
/* ===== Settings Overlay (共享) ===== */
.settings-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.45);
}
.settings-overlay[hidden] { display: none; }

.settings-dialog {
  width: min(92vw, 460px);
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
  border-radius: 12px;
  background: var(--surface);
  box-shadow: var(--shadow);
}
.settings-dialog h3 {
  margin: 0 0 18px;
  font-size: 18px;
}

.setting-row {
  margin-bottom: 14px;
}
.setting-label {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
}
.setting-row input,
.setting-row select {
  width: 100%;
  height: 40px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.setting-row input:focus,
.setting-row select:focus {
  border-color: #1976D2;
  box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.12);
}
.setting-row .hint {
  margin-top: 4px;
  font-size: 12px;
  color: var(--muted);
}

.settings-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel,
.btn-save {
  min-height: 38px;
  padding: 0 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  border: 0;
}
.btn-cancel {
  background: var(--surface-strong);
  color: var(--text);
  border: 1px solid var(--line);
}
.btn-cancel:hover { opacity: 0.8; }
.btn-save {
  background: #1976D2;
  color: #fff;
}
.btn-save:hover { background: #1565C0; }

/* ===== Toast (共享) ===== */
.toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%) translateY(20px);
  z-index: 2000;
  max-width: min(92vw, 420px);
  padding: 10px 16px;
  border-radius: 8px;
  background: rgba(26, 26, 46, 0.92);
  color: #fff;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 160ms ease, transform 160ms ease;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}


/* ===== Toast ===== */
.toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%) translateY(20px);
  z-index: 2000;
  max-width: min(92vw, 400px);
  padding: 10px 16px;
  border-radius: 8px;
  background: rgba(26,26,46,0.92);
  color: #fff;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 160ms ease, transform 160ms ease;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Loading ===== */
.loading-row {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .app-shell { padding: 12px 10px 28px; }
  .header { flex-wrap: wrap; }
  .controls-bar { gap: 6px; }
  .btn { height: 34px; padding: 0 12px; font-size: 13px; }
  .news-item { padding: 12px; }
  .news-title { font-size: 14px; }
}

/* ===== 演示版 UI 皮肤：强安视界 ===== */
:root {
  --bg: #f3f5f2;
  --surface: #ffffff;
  --surface-strong: #f7f8f4;
  --text: #17201d;
  --muted: #65716c;
  --line: #dfe5df;
  --primary: #11634f;
  --primary-soft: #e9f5ef;
  --primary-dark: #0d4f40;
  --red: #b42318;
  --red-soft: #fff1ed;
  --green: #16705a;
  --green-soft: #e8f5ef;
  --amber: #9a6500;
  --amber-soft: #fff7e6;
  --shadow: 0 10px 28px rgba(23, 32, 29, 0.07);
  --shadow-lg: 0 16px 36px rgba(23, 32, 29, 0.12);
}

body {
  background:
    linear-gradient(180deg, #faf8f4 0, #f3f5f2 260px, #f3f5f2 100%);
}

.app-shell {
  max-width: 980px;
  padding-top: 14px;
}

.header {
  position: relative;
  min-height: 94px;
  padding: 18px 18px 20px 22px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  border-bottom: 0;
  border-radius: 8px;
  background:
    linear-gradient(90deg, rgba(180, 35, 24, 0.07), rgba(17, 99, 79, 0.08)),
    var(--surface);
  box-shadow: var(--shadow);
}

.header::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
  border-radius: 8px 0 0 8px;
  background: linear-gradient(180deg, var(--red), var(--primary));
}

.header-left h1 {
  color: var(--text);
  font-size: 28px;
  letter-spacing: 0;
}

.header-left h1::after {
  content: "今日内容线索池";
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
}

.date-text {
  color: var(--red);
  font-weight: 700;
}

.icon-btn {
  box-shadow: none;
  background: rgba(255, 255, 255, 0.9);
}

.controls-bar {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.controls-bar select,
.btn,
.mode-toggle {
  border-radius: 8px;
}

.btn-primary {
  background: var(--red);
  box-shadow: 0 8px 18px rgba(180, 35, 24, 0.16);
}

.btn-primary:hover {
  background: #982018;
}

.btn-outline {
  border-color: rgba(17, 99, 79, 0.34);
  color: var(--primary);
}

.btn-outline:hover {
  background: var(--primary-soft);
}

.btn-amber {
  background: var(--amber);
}

.btn-green {
  background: var(--primary);
  box-shadow: 0 8px 18px rgba(17, 99, 79, 0.16);
}

.btn.is-thinking {
  background: linear-gradient(90deg, #0d4f40, var(--primary), var(--red), #0d4f40);
  background-size: 260% 100%;
  animation: aiButtonFlow 1.8s linear infinite;
}

.status-row {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: none;
}

.news-list {
  gap: 10px;
}

.news-item {
  position: relative;
  border-radius: 8px;
  box-shadow: none;
  transition: border-color 150ms, box-shadow 150ms, transform 150ms;
}

.news-item:hover {
  border-color: rgba(17, 99, 79, 0.42);
  box-shadow: 0 8px 18px rgba(23, 32, 29, 0.08);
  transform: translateY(-1px);
}

.news-item.selected {
  border-color: var(--primary);
  background: linear-gradient(180deg, #f8fffb, var(--primary-soft));
}

.news-title {
  font-size: 15px;
  line-height: 1.55;
}

.news-meta {
  gap: 8px;
}

.news-category,
.badge-ai,
.badge-hot {
  border-radius: 6px;
}

.news-actions button {
  border-radius: 8px;
}

.empty-state,
.loading-row {
  border: 1px dashed rgba(17, 99, 79, 0.28);
  border-radius: 8px;
  background: #fff;
}

#generateBtn {
  border-radius: 8px;
}

.ai-process-panel {
  position: relative;
  max-width: 560px;
  margin: 12px auto 0;
  padding: 12px;
  overflow: hidden;
  border: 1px solid rgba(17, 99, 79, 0.22);
  border-radius: 8px;
  background:
    linear-gradient(90deg, rgba(17, 99, 79, 0.08), rgba(180, 35, 24, 0.05)),
    #fff;
  text-align: left;
  animation: aiPanelIn 180ms ease-out;
}

.ai-process-panel[hidden] {
  display: none;
}

.ai-process-head {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  color: var(--text);
  font-size: 13px;
}

.ai-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 22px;
  border-radius: 6px;
  background: var(--primary);
  color: #fff;
  font-size: 12px;
  font-weight: 800;
}

.ai-dots {
  display: inline-flex;
  gap: 3px;
  margin-left: auto;
}

.ai-dots i {
  width: 5px;
  height: 5px;
  border-radius: 999px;
  background: var(--red);
  animation: aiDot 1.1s ease-in-out infinite;
}

.ai-dots i:nth-child(2) {
  animation-delay: 140ms;
}

.ai-dots i:nth-child(3) {
  animation-delay: 280ms;
}

.ai-scanbar {
  position: relative;
  height: 7px;
  margin: 12px 0 10px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(17, 99, 79, 0.1);
}

.ai-scanbar span {
  position: absolute;
  inset: 0 auto 0 0;
  width: 42%;
  border-radius: inherit;
  background: linear-gradient(90deg, transparent, var(--primary), var(--red), transparent);
  animation: aiScan 1.45s ease-in-out infinite;
}

.ai-step-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
}

.ai-step-row span {
  min-width: 0;
  padding: 5px 4px;
  border: 1px solid rgba(17, 99, 79, 0.14);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.75);
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  animation: aiStepPulse 1.8s ease-in-out infinite;
}

.ai-step-row span:nth-child(2) {
  animation-delay: 220ms;
}

.ai-step-row span:nth-child(3) {
  animation-delay: 440ms;
}

.ai-step-row span:nth-child(4) {
  animation-delay: 660ms;
}

@keyframes aiButtonFlow {
  from { background-position: 0% 50%; }
  to { background-position: 260% 50%; }
}

@keyframes aiPanelIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes aiDot {
  0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-3px); }
}

@keyframes aiScan {
  0% { transform: translateX(-110%); }
  55%, 100% { transform: translateX(250%); }
}

@keyframes aiStepPulse {
  0%, 100% {
    border-color: rgba(17, 99, 79, 0.14);
    color: var(--muted);
  }
  45% {
    border-color: rgba(180, 35, 24, 0.34);
    color: var(--primary);
  }
}

.article-card {
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.article-card-header {
  background: linear-gradient(90deg, var(--primary-soft), var(--red-soft));
}

.article-card-header h2,
.article-card-body h3 {
  color: var(--primary);
}

.article-card-body {
  font-size: 15px;
  line-height: 1.85;
}

.source-link a {
  color: var(--primary);
  font-weight: 700;
}

.settings-dialog {
  border-radius: 8px;
}

@media (max-width: 600px) {
  .header {
    min-height: auto;
    padding: 14px 12px 16px 18px;
  }

  .header-left h1 {
    font-size: 24px;
  }

  .header-left h1::after {
    font-size: 12px;
  }

  .controls-bar {
    padding: 10px;
  }

  .controls-bar select {
    flex: 1 1 128px;
  }

  .mode-toggle {
    flex: 1 1 100%;
  }
}
</style>
</head>
<body>

<main class="app-shell">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1>强安视界</h1>
      <div class="date-text" id="todayDate"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" title="设置">&#9881;</button>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls-bar">
    <select id="categoryFilter">
      <option value="全部">全部分类</option>
      <option value="国情">国情</option>
      <option value="军事">军事</option>
      <option value="科技">科技</option>
      <option value="民生">民生</option>
      <option value="财经生活">财经生活</option>
    </select>
    <button class="btn btn-outline btn-sm" id="selectAllBtn">全选</button>
    <button class="btn btn-outline btn-sm" id="deselectAllBtn">取消全选</button>
    <span class="spacer"></span>
    <button class="btn btn-primary" id="fetchBtn">获取新闻</button>

}

function getApiKey() {
  return window.DS_API_KEY || DEFAULT_API_KEY;
}

/* ---------- AI API 通用调用 ---------- */
function callDeepSeekDraft(params) {
  var baseUrl = getApiBase();
  var systemPrompt = params.systemPrompt;
  var userPrompt = params.userPrompt;
  var model = window.DS_MODEL || DEFAULT_MODEL;
  var maxTokens = params.maxTokens || 3600;
  var temperature = (params.temperature !== undefined) ? params.temperature : 0.7;
  var useJsonFormat = (params.jsonFormat !== false);

  var body = {
    model: model,
    messages: [
      { role: "system", content: systemPrompt },
      { role: "user", content: userPrompt }
    ],
    temperature: temperature,
    max_tokens: maxTokens,
    stream: false
  };
  if (useJsonFormat) {
    body.response_format = { type: "json_object" };
  }

  return fetch(baseUrl + "/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + getApiKey()
    },
    body: JSON.stringify(body)
  }).then(function(response) {
    return response.json().then(function(payload) {
      if (!response.ok) {
        var msg = (payload && payload.error && payload.error.message) ? payload.error.message : ("HTTP " + response.status);
        throw new Error(msg);
      }
      var content = payload && payload.choices && payload.choices[0] && payload.choices[0].message && payload.choices[0].message.content;
      if (!content) {
        throw new Error("API 返回内容为空");
      }
      return content.trim();
    });
  });
}

/* ---------- Pexels 配图 ---------- */
function fetchPexelsImages(keywords) {
  if (!keywords || !keywords.length) return Promise.resolve([]);
  var apiKey = window.PEXELS_API_KEY;
  if (!apiKey) return Promise.resolve([]);

  return Promise.all(keywords.map(function(kw) {
    return fetch("https://api.pexels.com/v1/search?query=" + encodeURIComponent(kw) + "&per_page=1", {
      headers: { "Authorization": apiKey }
    }).then(function(resp) {
      if (!resp.ok) return null;
      return resp.json();
    }).then(function(data) {
      if (data && data.photos && data.photos.length) {
        return {
          keyword: kw,
          url: data.photos[0].src.medium,
          photographer: data.photos[0].photographer
        };
      }
      return null;
    }).catch(function() { return null; });
  })).then(function(results) {
    return results.filter(Boolean);
  });
}

function injectPexelsImages(html, pexelsResults) {
  if (!html || !pexelsResults || !pexelsResults.length) return html;
  var result = html;
  pexelsResults.forEach(function(img) {
    var imgTag = '<img src="' + img.url + '" alt="' + escapeHtml(img.keyword || '配图') + '" style="max-width:100%;border-radius:8px;margin:12px 0;" loading="lazy" />' +
      '<p style="font-size:11px;color:#999;text-align:center;">Photo by ' + escapeHtml(img.photographer || 'Pexels') + ' on Pexels</p>';
    var hintMarker = "<div class='img-hint'>";
    var idx = result.indexOf(hintMarker);
    if (idx !== -1) {
      var endIdx = result.indexOf("</div>", idx);
      if (endIdx !== -1) {
        result = result.substring(0, idx) + imgTag + result.substring(endIdx + 6);
      }
    }
  });
  return result;
}

/* ---------- 设置面板 ---------- */
function initSettings() {
  var els = {
    settingsOverlay: document.getElementById("settingsOverlay"),
    settingsBtn: document.getElementById("settingsBtn"),
    settingsCancel: document.getElementById("settingsCancel"),
    settingsSave: document.getElementById("settingsSave"),
    brandSelect: document.getElementById("brandSelect"),
    modelSelect: document.getElementById("modelSelect"),
    apiKeyInput: document.getElementById("apiKeyInput"),
    baseUrlInput: document.getElementById("baseUrlInput"),
    pexelsKeyInput: document.getElementById("pexelsKeyInput")
  };

  if (!els.settingsBtn || !els.settingsOverlay) return;

  // 读取当前设置
  if (els.apiKeyInput) els.apiKeyInput.value = window.DS_API_KEY || "";
  if (els.baseUrlInput) els.baseUrlInput.value = window.DS_BASE_URL || DEFAULT_BASE_URL;
  if (els.pexelsKeyInput) els.pexelsKeyInput.value = window.PEXELS_API_KEY || "";

  // ---- 两级模型选择器 ----
  var savedModel = window.DS_MODEL || DEFAULT_MODEL;
  var savedBrand = getBrandForModel(savedModel);

  // 填充品牌下拉
  if (els.brandSelect) {
    els.brandSelect.innerHTML = "";
    MODEL_BRANDS.forEach(function(brand) {
      var opt = document.createElement("option");
      opt.value = brand.name;
      opt.textContent = brand.name;
      els.brandSelect.appendChild(opt);
    });
    els.brandSelect.value = savedBrand.name;
  }

  // 品牌切换 → 刷新模型列表
  function populateModels(brandName) {
    if (!els.modelSelect) return;
    els.modelSelect.innerHTML = "";
    var brand = null;
    for (var i = 0; i < MODEL_BRANDS.length; i++) {
      if (MODEL_BRANDS[i].name === brandName) { brand = MODEL_BRANDS[i]; break; }
    }
    if (!brand) return;
    brand.models.forEach(function(modelId) {
      var info = MODEL_MAP[modelId];
      if (!info) return;
      var opt = document.createElement("option");
      opt.value = modelId;
      opt.textContent = info.name;
      els.modelSelect.appendChild(opt);
    });
    // 如果当前保存的模型属于该品牌，选中它；否则选第一个
    if (savedModel && brand.models.indexOf(savedModel) !== -1) {
      els.modelSelect.value = savedModel;
    } else {
      els.modelSelect.value = brand.models[0];
    }
    // 更新 Base URL
    updateBaseUrl();
  }

  function updateBaseUrl() {
    if (!els.modelSelect || !els.baseUrlInput) return;
    var modelId = els.modelSelect.value;
    var info = MODEL_MAP[modelId];
    if (info && info.baseUrl) els.baseUrlInput.value = info.baseUrl;
  }

  if (els.brandSelect) {
    els.brandSelect.addEventListener("change", function() {
      savedModel = null; // 切换品牌后不再记住旧模型
      populateModels(els.brandSelect.value);
    });
    // 初始填充
    populateModels(savedBrand.name);
  }

  if (els.modelSelect && els.baseUrlInput) {
    els.modelSelect.addEventListener("change", updateBaseUrl);
  }

  // 打开设置面板
  els.settingsBtn.addEventListener("click", function() {
    // 打开时重新同步品牌
    var curModel = window.DS_MODEL || DEFAULT_MODEL;
    var curBrand = getBrandForModel(curModel);
    if (els.brandSelect) els.brandSelect.value = curBrand.name;
    savedModel = curModel;
    populateModels(curBrand.name);
    els.settingsOverlay.hidden = false;
  });

  // 关闭
  els.settingsCancel.addEventListener("click", function() {
    els.settingsOverlay.hidden = true;
  });

  // 保存
  els.settingsSave.addEventListener("click", function() {
    var newKey = els.apiKeyInput ? els.apiKeyInput.value.trim() : "";
    var newModel = els.modelSelect ? els.modelSelect.value : DEFAULT_MODEL;
    var newBaseUrl = els.baseUrlInput ? els.baseUrlInput.value.trim() : "";
    var newPexelsKey = els.pexelsKeyInput ? els.pexelsKeyInput.value.trim() : "";

    if (newKey) {
      localStorage.setItem("ds_api_key", newKey);
      window.DS_API_KEY = newKey;
    } else {
      localStorage.removeItem("ds_api_key");
      window.DS_API_KEY = DEFAULT_API_KEY;
    }

    localStorage.setItem("ds_model", newModel);
    window.DS_MODEL = newModel;

    if (newBaseUrl) {
      localStorage.setItem("ds_base_url", newBaseUrl);
      window.DS_BASE_URL = newBaseUrl;
    } else {
      localStorage.removeItem("ds_base_url");
      window.DS_BASE_URL = DEFAULT_BASE_URL;
    }

    if (newPexelsKey) {
      localStorage.setItem("pexels_api_key", newPexelsKey);
      window.PEXELS_API_KEY = newPexelsKey;
    } else {
      localStorage.removeItem("pexels_api_key");
      window.PEXELS_API_KEY = "";
    }

    els.settingsOverlay.hidden = true;
    showToast("API 设置已保存");
  });
}

/* ---------- 智能排名 ---------- */
function rankNews(items) {
  // 归一化 hotValue（0-100 区间映射）
  var maxHot = 0;
  items.forEach(function(item) { if ((item.hotValue || 0) > maxHot) maxHot = item.hotValue || 0; });

  // 分类权重：国情/军事 > 科技 > 民生 > 财经生活
  var catWeight = { "国情": 1.2, "军事": 1.15, "科技": 1.1, "民生": 1.05, "财经生活": 1.0 };

  items.forEach(function(item) {
    var score = 0;

    // 1. 热度分（0-40 分）
    var hotNorm = maxHot > 0 ? ((item.hotValue || 0) / maxHot) : 0;
    score += hotNorm * 40;

    // 2. 标题吸引力分（0-35 分）
    var title = item.title || "";
    var attract = 0;
    // 含数字
    if (/\d/.test(title)) attract += 8;
    // 含疑问/悬念词
    if (/[？?]/.test(title) || /为何|为什么|原因|背后|真相|内幕|曝光|突发|刚刚|震惊|重磅|紧急/.test(title)) attract += 10;
    // 含冲突/对比词
    if (/但|竟|却|居然|意外|反转|逆袭|突破|首次|第一|新高|创/.test(title)) attract += 10;
    // 含动作词（让标题有张力）
    if (/宣布|警告|出手|启动|叫停|暴跌|暴涨|飙升|崩了|火了/.test(title)) attract += 7;
    // 长度适中（8-25字最佳）
    var len = title.length;
    if (len >= 8 && len <= 25) attract += 5;
    else if (len >= 5 && len <= 35) attract += 2;
    score += attract;

    // 3. 分类权重（0-15 分）
    var cw = catWeight[item.category] || 1.0;
    score += cw * 10;

    // 4. 时效性（0-10 分）- 当日热榜源头天然得分
    if (item.source === "今日头条" || item.source.indexOf("百度热榜") === 0) score += 10;
    else if (item.pubDate) score += 3;

    item._score = Math.round(score * 10) / 10;
  });

  // 按 _score 降序排列
  items.sort(function(a, b) { return (b._score || 0) - (a._score || 0); });

  // 重新分配 id
  items.forEach(function(item, i) { item.id = "n" + i; });

  return items;
}

/* ---------- RSS 解析 ---------- */
function parseRSS(xmlText) {
  var items = [];
  var reItem = /<item>([\s\S]*?)<\/item>/gi;
  var match;
  while ((match = reItem.exec(xmlText)) !== null) {
    var block = match[1];
    var title   = (block.match(/<title>(.*?)<\/title>/i)   || [])[1] || "";
    var link    = (block.match(/<link>(.*?)<\/link>/i)     || [])[1] || "";
    var desc    = (block.match(/<description>(.*?)<\/description>/i) || [])[1] || "";
    var pubDate = (block.match(/<pubDate>(.*?)<\/pubDate>/i) || [])[1] || "";
    // clean HTML tags from title & description
    title = title.replace(/<[^>]+>/g, "").trim();
    desc  = desc.replace(/<[^>]+>/g, "").trim();
    if (title) {
      items.push({ title: title, link: link, summary: desc, pubDate: pubDate });
    }
  }
  return items;
}

function fetchToutiaoNews() {
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, TOUTIAO_TIMEOUT_MS);

  function fetchOne(url) {
    return fetch(CORS_PROXY + encodeURIComponent(url + "&_t=" + Date.now()), {
      signal: controller.signal,
      headers: { "Accept": "application/json" }
    })
      .then(function(resp) {
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        return resp.json();
      })
      .then(function(data) {
        var articles = data.data || [];
        return articles
          .filter(function(a) { return a.article_genre === "article"; })
          .map(function(a) {
            var link = a.source_url || "";
            if (link && link.indexOf("http") !== 0) link = "https://www.toutiao.com" + link;
            // 热度近似值：评论数 + 播放量/1000，保底 10
            var hot = (a.comments_count || 0) + Math.round((a.video_play_count || 0) / 1000);
            var rawTitle = (a.title || "").replace(/\s+/g, " ").trim();
            // 截断过长标题：30字符（约15个中文），超出加"..."
            var title = rawTitle.length > 30 ? rawTitle.slice(0, 30) + "..." : rawTitle;
            return {
              title: title,
              link: link,
              summary: (a.abstract || "").trim(),
              full_text: "",
              has_full: false,
              pubDate: "",
              source: "今日头条",
              hotValue: hot || 10
            };
          });
      })
      .catch(function(err) {
        console.warn("头条分类抓取失败: " + err.message);
        return [];
      });
  }

  return Promise.all(TOUTIAO_FEED_URLS.map(fetchOne))
    .then(function(results) {
      clearTimeout(timeoutId);
      // 合并所有分类，按标题去重，截断到 TOUTIAO_MAX_RAW
      var seen = {};
      var merged = [];
      results.forEach(function(arr) {
        arr.forEach(function(item) {
          if (!seen[item.title]) {
            seen[item.title] = true;
            merged.push(item);
          }
        });
      });
      return merged.slice(0, TOUTIAO_MAX_RAW);
    });
}

          });
        }
        return results;
      })
      .catch(function(err) {
        console.warn("搜索聚合失败: " + src.name, err.message);
        return [];
      });
  }

  return Promise.all(SEARCH_SOURCES.map(fetchOne))
    .then(function(results) {
      var all = [];
      results.forEach(function(arr) { all = all.concat(arr); });
      return all;
    });
}

/* ---------- 获取新闻 ---------- */
function fetchNews() {
  els.fetchBtn.disabled = true;
  els.rewriteBtn.disabled = true;
  newsItems = [];
  selectedIds = {};
  // 每次抓取新数据时清除旧改写缓存，确保显示原标题
  rewrittenCache = {};
  saveRewrittenCache();
  els.articleSection.hidden = true;
  els.copyBar.hidden = true;
  setAiProcess(false);
  generatedArticles = [];

  setStatus("loading", "正在从 RSS 实时获取...");
  els.countText.textContent = "";
  els.newsList.innerHTML = '<div class="loading-row">正在从多个新闻源拉取...</div>';

  var promises = RSS_SOURCES.map(function(src) {
    var fetchUrl = RSS2JSON_API + encodeURIComponent(src.url) + "&_t=" + Date.now();
    return fetch(fetchUrl)
      .then(function(resp) {
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        return resp.json();
      })
      .then(function(data) {
        if (data.status !== "ok") throw new Error("rss2json API error");
        return (data.items || []).map(function(item) {
          return {
            title: truncateTitle((item.title || "").replace(/<[^>]+>/g, "").trim()),
            link: item.link || "",
            summary: (item.description || "").replace(/<\/p>\s*<p>/gi, "\n\n").replace(/<br\s*\/?>/gi, "\n").replace(/<[^>]+>/g, "").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim(),
            full_text: "",
            has_full: false,
            pubDate: item.pubDate || "",
            source: src.name
          };
        });
      })
      .catch(function(err) {
        console.warn("RSS 获取失败: " + src.name, err.message);
        return [];
      });
  });

  // 追加今日头条热榜
  promises.push(fetchToutiaoNews());
  // 追加百度实时热榜（corsproxy.io，手机端可用）
  promises.push(fetchBaiduHot());
  // 追加搜索引擎聚合扩展源
  promises.push(fetchSearchSources());

  return Promise.all(promises).then(function(results) {
    var allItems = [];
    results.forEach(function(arr) { allItems = allItems.concat(arr); });

    // 去重（按标题）
    var seen = {};
    var uniqueItems = [];
    allItems.forEach(function(item) {
      var key = item.title.substring(0, 30);
      if (!seen[key]) {
        seen[key] = true;
        uniqueItems.push(item);
      }
    });

    // 过滤 + 分类
    var classified = uniqueItems
      .filter(function(item) { return !isBlocked(item.title, item.summary); })
      .map(function(item, index) {
        item.category = item.category || classifyNews(item.title, item.summary);
        item.id = "n" + index;
        item._originalTitle = item.title;
        return item;
      });

    // 控制热榜占比：头条源最多保留 TOUTIAO_MAX_KEEP 条，百度热榜最多保留 BAIDU_MAX_KEEP 条
    var toutiaoItems = [];
    var baiduItems = [];
    var rssItems = [];
    classified.forEach(function(item) {
      if (item.source === "今日头条") {
        toutiaoItems.push(item);
      } else if (item.source.indexOf("百度热榜") === 0) {
        baiduItems.push(item);
      } else {
        rssItems.push(item);
      }
    });
    // 头条按 hotValue 降序取前 N 条
    toutiaoItems.sort(function(a, b) { return (b.hotValue || 0) - (a.hotValue || 0); });
    toutiaoItems = toutiaoItems.slice(0, TOUTIAO_MAX_KEEP);
    // 百度热榜按 hotValue 降序取前 N 条
    baiduItems.sort(function(a, b) { return (b.hotValue || 0) - (a.hotValue || 0); });
    baiduItems = baiduItems.slice(0, BAIDU_MAX_KEEP);

    // 合并后重新排名（rankNews 内统一做截断兜底）
    var allMerged = rssItems.concat(toutiaoItems).concat(baiduItems);
    allMerged.forEach(function(item) { item.title = truncateTitle(item.title); });
    newsItems = rankNews(allMerged);

    renderNews();
    els.fetchBtn.disabled = false;
    if (newsItems.length > 0) {
      els.rewriteBtn.disabled = false;
      setStatus("success", "已获取 " + newsItems.length + " 条新闻，可选分类过滤后点击「批量标题优化」");
    } else {
      setStatus("error", "未获取到新闻，请检查 CORS 代理是否可用");
    }
    els.countText.textContent = "共 " + newsItems.length + " 条";
  }).catch(function(err) {
    els.fetchBtn.disabled = false;
    setStatus("error", "获取失败: " + (err.message || "未知错误"));
    els.newsList.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;</div><p>获取新闻失败，请检查 CORS 代理地址或网络连接</p></div>';
  });
}

/* ---------- 渲染新闻列表 ---------- */
function renderNews() {
  var filtered = newsItems;
  if (activeCategory !== "全部") {
    filtered = newsItems.filter(function(item) { return item.category === activeCategory; });
  }

  if (!filtered.length) {
    els.newsList.innerHTML = '<div class="empty-state"><p>当前分类下无新闻</p></div>';
  } else {
    els.newsList.innerHTML = filtered.map(function(item) {
      var selClass = selectedIds[item.id] ? " selected" : "";
      var checked  = selectedIds[item.id] ? " checked" : "";
      var displayTitle = rewrittenCache[item.id] || item.title;
      var aiBadge = rewrittenCache[item.id] ? ' <span class="badge-ai">AI</span>' : "";
      var hotBadge = "";
      if (item.heat && item.heat > 0) {
        var hotTips = (item.hot_matches && item.hot_matches.length) ? item.hot_matches.slice(0, 3).join("、") : "";
        hotBadge = ' <span class="badge-hot" title="匹配热搜：' + escapeHtml(hotTips) + '">热度 ' + item.heat + '</span>';
      } else if (item.hotValue && item.hotValue > 0) {
        var hotW = item.hotValue > 100000 ? Math.round(item.hotValue / 10000) + "万" : item.hotValue;
        hotBadge = ' <span class="badge-hot" title="实时热值: ' + item.hotValue + '">热度 ' + hotW + '</span>';
      }
      return '<div class="news-item' + selClass + '" data-id="' + item.id + '">' +
        '<input type="checkbox" class="news-checkbox" data-id="' + item.id + '" ' + checked + ' />' +
        '<div class="news-body">' +
          '<div class="news-title">' + escapeHtml(displayTitle) + aiBadge + hotBadge + '</div>' +
          '<div class="news-meta">' +
            '<span>' + escapeHtml(item.source) + '</span>' +
            '<span>' + escapeHtml(item.pubDate || "") + '</span>' +
            '<span class="news-category">' + escapeHtml(item.category) + '</span>' +
          '</div>' +
          '<div class="news-actions">' +
            '<button class="btn-rewrite-item" data-id="' + item.id + '"' + (rewrittenCache[item.id] ? ' style="display:none"' : '') + '>标题优化</button>' +
            '<button class="btn-undo-item" data-id="' + item.id + '"' + (!rewrittenCache[item.id] ? ' style="display:none"' : '') + '>恢复原版标题</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join("");
  }

  updateGenerateBtn();
}

function updateGenerateBtn() {
  var count = Object.keys(selectedIds).length;
  els.selectedCount.textContent = count;
  els.generateBtn.disabled = count === 0;
}

/* ---------- AI 标题改写 ---------- */
function rewriteTitles() {
  if (!getApiKey()) {
    showToast("请先在设置面板中填写 API Key");
    els.settingsBtn.click();
    return;
  }
  var toRewrite = newsItems.filter(function(item) { return !rewrittenCache[item.id]; });
  if (toRewrite.length === 0) {
    showToast("所有标题已完成优化");
    return;
  }

  els.rewriteBtn.disabled = true;
  setStatus("loading", "AI 标题优化中...");

  // 每次处理 10 条
  var batchSize = 10;
  var batchIndex = 0;
  var totalBatches = Math.ceil(toRewrite.length / batchSize);

  function processBatch() {
    if (batchIndex >= toRewrite.length) {
      els.rewriteBtn.disabled = false;
      saveRewrittenCache();
      renderNews();
      setStatus("success", "标题优化完成，请勾选感兴趣的新闻后生成文章");
      showToast("标题优化完成");
      return;
    }

    var batch = toRewrite.slice(batchIndex, batchIndex + batchSize);
    var batchNum = Math.floor(batchIndex / batchSize) + 1;
    setStatus("loading", "AI 标题优化中 (" + batchNum + "/" + totalBatches + ")...");

    callAIRewrite(batch).then(function(rewritten) {
      rewritten.forEach(function(item) {
        if (item.title) rewrittenCache[item.id] = item.title;
      });
      batchIndex += batchSize;
      processBatch();
    }).catch(function(err) {
      console.warn("AI 改写失败:", err);
      // 失败回退：直接用原标题
      batch.forEach(function(item) {
        if (!rewrittenCache[item.id]) rewrittenCache[item.id] = item.title;
      });
      batchIndex += batchSize;
      processBatch();
    });
  }

  processBatch();
}

function callAIRewrite(batchItems) {
  var titles = batchItems.map(function(item, i) {
    return (i + 1) + ". " + item.title + "（来源：" + item.source + "）";
  }).join("\n");

  var systemPrompt = els.groundMode && els.groundMode.checked
    ? "你是一个服务煤矿工人群体的新闻编辑。请将以下新闻标题改写得更吸引眼球，参考今日头条风格——用冲突、悬念、数字、反差、通俗比喻来抓注意力，但不变更事实、不低俗不煽动。读者是煤矿一线职工，语言要做到通俗化表达、有温度、能让他们产生兴趣点开阅读。对每条输入，输出对应序号的改写标题，严格按照 JSON 数组格式：\n[{\"id\":\"序号\",\"title\":\"改写后标题\"}]"
    : "你是一个新闻标题优化专家。请将以下新闻标题进行优化改写——保留事实和来源、不改变原意，让标题更适合职工阅读。不要改变事实，不要添加原文没有的信息，只是让表达更清晰易懂。对每条输入，输出对应序号的改写标题，严格按照 JSON 数组格式：\n[{\"id\":\"序号\",\"title\":\"改写后标题\"}]";

  var userPrompt = "请改写以下新闻标题：\n" + titles + "\n\n请直接输出 JSON 数组，不要输出任何其他内容。";

  return callDeepSeekDraft({systemPrompt: systemPrompt, userPrompt: userPrompt}).then(function(raw) {
    try {
      var parsed = JSON.parse(raw);
      var result = [];
      parsed.forEach(function(r) {
        var idx = parseInt(r.id, 10) - 1;
        if (idx >= 0 && idx < batchItems.length) {
          result.push({ id: batchItems[idx].id, title: r.title });
        }
      });
      return result;
    } catch(e) {
      // 解析失败，回退
      return batchItems.map(function(item) { return { id: item.id, title: item.title }; });
    }
  });
}

/* ---------- 单条标题优化 ---------- */
function rewriteSingleTitle(itemId) {
  if (!getApiKey()) {
    showToast("请先在设置面板中填写 API Key");
    els.settingsBtn.click();
    return;
  }
  var item = null;
  for (var i = 0; i < newsItems.length; i++) {
    if (newsItems[i].id === itemId) { item = newsItems[i]; break; }
  }
  if (!item) return;

  // 保存原始标题
  if (!item._originalTitle) item._originalTitle = item.title;

  setStatus("loading", "AI 标题优化中...");

  callAIRewrite([item]).then(function(rewritten) {
    if (rewritten[0] && rewritten[0].title) {
      rewrittenCache[itemId] = rewritten[0].title;
    }
    saveRewrittenCache();
    renderNews();
    setStatus("success", "标题优化完成");
  }).catch(function() {
    renderNews();
    setStatus("error", "标题优化失败，请重试");
  });
}

/* ---------- 撤销单条标题优化 ---------- */
function undoRewrite(itemId) {
  delete rewrittenCache[itemId];
  saveRewrittenCache();
  renderNews();
  setStatus("success", "已恢复原版标题");
}

/* ---------- AI 写稿 ---------- */
function generateArticles() {
  var selectedItems = newsItems.filter(function(item) { return selectedIds[item.id]; });
  if (!selectedItems.length) {
    showToast("请先勾选新闻");
    return;
  }

  els.generateBtn.disabled = true;
  setAiProcess(true, "正在读取已选资讯并组织稿件");
  var total = selectedItems.length;
  var done = 0;
  generatedArticles = [];
  els.articleSection.hidden = false;
  els.copyBar.hidden = false;
  els.articleSection.innerHTML = '<div class="loading-row">AI 正在写文章 (0/' + total + ')...</div>';

  var SYSTEM = "你是一位资深新闻编辑，面向35-55岁成年男性读者写新闻稿。要求：\n" +
    "1. 根据新闻标题写一篇500-800字的新闻解读，结构：标题 → 导语（核心冲突/亮点，2-3句） → 正文 → 收尾\n" +
    "2. 标题要吸引点击，但不能低俗煽动——用冲突、悬念、数字、反差来抓眼球\n" +
    "3. 导语直接抛出最核心的信息，不铺垫不啰嗦\n" +
    "4. 正文要有干货（数据、事实、前因后果），语言干净利落，不喊口号不装腔\n" +
    "5. 文末一行：参考来源：[来源名称]，原文链接：[链接]\n" +
    "6. 输出纯JSON：{\"title\":\"标题\",\"article\":\"正文\"}";

  function processOne(index) {
    if (index >= total) {
      els.generateBtn.disabled = false;
      renderGeneratedArticles();
      setStatus("success", "AI 写稿完成，共 " + generatedArticles.length + " 篇");
      setAiProcess(false);
      return;
    }

    var item = selectedItems[index];
    var itemTitle = rewrittenCache[item.id] || item.title;
    setStatus("loading", "AI 写稿 (" + (index + 1) + "/" + total + "): " + itemTitle.substring(0, 18) + "...");
    setAiProcess(true, "正在处理第 " + (index + 1) + " 条线索：" + itemTitle.substring(0, 16));

    var userPrompt = "新闻标题：" + itemTitle +
      "\n来源：" + item.source +
      "\n原文链接：" + (item.link || "无") +
      "\n\n【以下为原文素材，请基于此写稿】\n" + (item.full_text || item.summary || "无素材") +
      "\n\n请直接输出JSON。";

    callDeepSeekDraft({systemPrompt: SYSTEM, userPrompt: userPrompt}).then(function(raw) {
      var article;
      try {
        article = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
      } catch(e) {
        article = { title: itemTitle, article: item.summary || "AI 写稿失败，请查看原文：" + (item.link || "") };
      }
      generatedArticles.push({
        title: article.title || itemTitle,
        article: article.article || "",
        source: item.source,
        link: item.link
      });
      done++;
      els.articleSection.innerHTML = '<div class="loading-row">AI 正在写文章 (' + done + '/' + total + ')...</div>';
      processOne(index + 1);
    }).catch(function(err) {
      console.warn("AI 写稿失败:", err);
      generatedArticles.push({
        title: itemTitle,
        article: "AI 写稿失败，请查看原文：" + (item.link || ""),
        source: item.source,
        link: item.link
      });
      done++;
      els.articleSection.innerHTML = '<div class="loading-row">AI 正在写文章 (' + done + '/' + total + ')...</div>';
      processOne(index + 1);
    });
  }

  processOne(0);
}

function renderGeneratedArticles() {
  els.articleSection.innerHTML = generatedArticles.map(function(article, i) {
    var title = escapeHtml(article.title);
    var body = article.article
      ? article.article.replace(/\n/g, '<br>')
      : "点击阅读原文查看详情";
    var sourceHtml = "来源：" + escapeHtml(article.source) +
      (article.link ? ' · <a href="' + escapeHtml(article.link) + '" target="_blank" rel="noopener">阅读原文</a>' : "");

    // 装饰性头图：按序号换色
    var colors = ["#1a5276","#117a65","#935116","#76448a","#b03a2e","#1e8449"];
    var barColor = colors[i % colors.length];

    return '<div class="article-card">' +
      '<div class="article-card-bar" style="background:' + barColor + ';"></div>' +
      '<div class="article-card-body">' +
        '<h3>' + title + '</h3>' +
        '<div class="article-summary">' + body + '</div>' +
        '<div class="source-link">' + sourceHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join("");

  els.articleSection.scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ---------- 复制全部 ---------- */
function copyAll() {
  if (!generatedArticles.length) return;
  var text = generatedArticles.map(function(a) {
    return "【" + a.title + "】\n" + (a.article || "") + "\n来源：" + a.source + (a.link ? " " + a.link : "");
  }).join("\n\n---\n\n");

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      showToast("已复制全部");
    }).catch(function() {
      showToast("复制失败，请手动复制");
    });
  } else {
    showToast("当前浏览器不支持自动复制");
  }
}

/* ---------- 选择逻辑 ---------- */
function toggleSelect(id) {
  if (selectedIds[id]) {
    delete selectedIds[id];
  } else {
    selectedIds[id] = true;
  }
  renderNews();
}

function selectAll() {
  var filtered = newsItems;
  if (activeCategory !== "全部") {
    filtered = newsItems.filter(function(item) { return item.category === activeCategory; });
  }
  filtered.forEach(function(item) { selectedIds[item.id] = true; });
  renderNews();
}

function deselectAll() {
  selectedIds = {};
  renderNews();
}

/* ---------- 事件绑定 ---------- */
function bindEvents() {
  console.log("=== BIND EVENTS ===");
  // 新闻列表点击
  console.log("bound: newsList");
  els.newsList.addEventListener("click", function(e) {
    var cb = e.target.closest(".news-checkbox");
    if (cb) {
      e.stopPropagation();
      toggleSelect(cb.dataset.id);
      return;
    }
    var item = e.target.closest(".news-item");
    if (item) {
      var cb2 = item.querySelector(".news-checkbox");
      if (cb2) toggleSelect(cb2.dataset.id);
    }
  });

  console.log("bound: selectAllBtn");
  els.selectAllBtn.addEventListener("click", selectAll);
  console.log("bound: deselectAllBtn");
  els.deselectAllBtn.addEventListener("click", deselectAll);
  console.log("bound: fetchBtn");
  els.fetchBtn.addEventListener("click", fetchNews);
  console.log("bound: rewriteBtn");
  els.rewriteBtn.addEventListener("click", rewriteTitles);
  // 事件委托：单条标题优化 / 撤销按钮（动态渲染）
  els.newsList.addEventListener("click", function(e) {
    var btn = e.target.closest(".btn-rewrite-item");
    if (btn) { e.preventDefault(); rewriteSingleTitle(btn.dataset.id); return; }
    btn = e.target.closest(".btn-undo-item");
    if (btn) { e.preventDefault(); undoRewrite(btn.dataset.id); return; }
  });
  console.log("bound: generateBtn");
  els.generateBtn.addEventListener("click", generateArticles);
  console.log("bound: copyAllBtn");
  els.copyAllBtn.addEventListener("click", copyAll);

  console.log("bound: categoryFilter");
  els.categoryFilter.addEventListener("change", function() {
    activeCategory = els.categoryFilter.value;
    renderNews();
  });
}

/* ---------- 初始化 ---------- */
function init() {
  console.log("=== INIT START ===");
  els.todayDate.textContent = formatDate();
  // 不再从 localStorage 恢复改写缓存 —— 每次加载新数据时强制显示原标题
  bindEvents();
  initSettings();
  // 优先尝试实时抓取，全部来源失败再回退嵌入缓存
  setStatus("loading", "正在刷新...");
  fetchNews().then(function() {
    if (!newsItems || newsItems.length === 0) {
      loadEmbeddedNews();
    }
  });
}

init();
